version: '3.8'

networks:
  ecrons_net:
    name: ecrons_net
    driver: bridge

services:
  traefik:
    image: traefik:v2.10
    container_name: global_traefik
    restart: always
    command:
      - "--api.insecure=false"
      - "--providers.file.filename=/etc/traefik/dynamic_conf.yml" 
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    networks:
      - ecrons_net
    volumes:
      - ./dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: global_tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - ecrons_net

  mysql-global:
    image: mysql:8.0
    container_name: global_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3312:3306"
    volumes:
      - mysql_global_data:/var/lib/mysql
    networks:
      - ecrons_net

  redis-global:
    image: redis:7-alpine
    container_name: global_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ecrons_net
    volumes:
      - redis_global_data:/data

volumes:
  mysql_global_data:
  redis_global_data: